name: Release

# Builds a universal, Developer ID–signed & notarized DMG and attaches it to the
# GitHub Release whenever a version tag (e.g. v1.2.0) is pushed.
#
# Required repository secrets for a fully signed + notarized build:
#   MACOS_CERTIFICATE          Base64 of your "Developer ID Application" .p12
#   MACOS_CERTIFICATE_PASSWORD Password for that .p12
#   MACOS_SIGN_IDENTITY        e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_TEAM_ID              Your Apple Developer Team ID
#   NOTARY_APPLE_ID            Apple ID email used for notarization
#   NOTARY_PASSWORD            App-specific password for that Apple ID
#
# If the signing secrets are absent, the workflow still builds an (ad-hoc) DMG so
# the release pipeline works before you have an Apple Developer account.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import signing certificate
        if: ${{ env.MACOS_CERTIFICATE != '' }}
        env:
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN"

      - name: Set up notarytool profile
        if: ${{ env.NOTARY_APPLE_ID != '' }}
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials wakeup-notary \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARY_PASSWORD"

      - name: Build DMG
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PROFILE: ${{ secrets.NOTARY_APPLE_ID != '' && 'wakeup-notary' || '' }}
        run: |
          chmod +x scripts/build_dmg.sh
          ./scripts/build_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wakeup-dmg
          path: build/*.dmg

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.dmg
          generate_release_notes: true
